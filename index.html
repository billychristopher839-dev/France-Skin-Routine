<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>France : Road to #1 — Le Protocole Présidentiel</title>
<style>
:root{
  --bleu:#000091;
  --bleu-hover:#1212ff;
  --rouge:#E1000F;
  --ink:#161616;
  --paper:#ffffff;
  --gris:#f5f5fe;
  --gris-line:#dddded;
  --locked:#e3e3fd;
  --gold:#c9a227;
  --ok:#18753c;
  --shadow:0 2px 6px rgba(0,0,145,.12);
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Marianne","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--gris);color:var(--ink);line-height:1.5;
}
button{font-family:inherit;cursor:pointer}
.tricolore{height:6px;display:flex}
.tricolore span{flex:1}
.tricolore span:nth-child(1){background:var(--bleu)}
.tricolore span:nth-child(2){background:#fff}
.tricolore span:nth-child(3){background:var(--rouge)}

header{background:var(--paper);border-bottom:1px solid var(--gris-line)}
.head-inner{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.head-inner img.logo{height:70px;width:auto}
.head-title h1{font-size:1.35rem;letter-spacing:.02em;color:var(--bleu)}
.head-title p{font-size:.85rem;color:#555}
.head-spacer{flex:1}
.flag-mini{height:26px;border:1px solid var(--gris-line);border-radius:3px}
.lang-toggle{display:flex;border:1px solid var(--bleu);border-radius:var(--radius);overflow:hidden}
.lang-toggle button{background:#fff;color:var(--bleu);border:none;padding:7px 14px;font-weight:700;font-size:.85rem}
.lang-toggle button.active{background:var(--bleu);color:#fff}

main{max-width:1100px;margin:0 auto;padding:22px 20px 60px}
section{margin-bottom:34px}
h2{font-size:1.15rem;color:var(--bleu);margin-bottom:12px;display:flex;align-items:center;gap:10px}
h2 .rule{flex:1;height:1px;background:var(--gris-line)}

.brief{background:var(--paper);border:1px solid var(--gris-line);border-left:4px solid var(--rouge);border-radius:var(--radius);padding:14px 18px;font-size:.93rem;box-shadow:var(--shadow)}
.brief strong{color:var(--bleu)}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:var(--paper);border:1px solid var(--gris-line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.stat .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#666}
.stat .val{font-size:1.7rem;font-weight:800;color:var(--bleu);line-height:1.2}
.stat .sub{font-size:.75rem;color:#777}
.stat.rank .val{color:var(--rouge)}
.progress-wrap{margin-top:14px;background:var(--paper);border:1px solid var(--gris-line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.progress-bar{height:16px;background:var(--gris);border-radius:8px;overflow:hidden;margin-top:8px;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--bleu) 0%,var(--bleu) 60%,var(--rouge) 100%);border-radius:8px;transition:width .6s ease;min-width:2px}
.progress-txt{font-size:.85rem;display:flex;justify-content:space-between}

.log-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.log-btn{background:var(--paper);border:2px solid var(--gris-line);border-radius:var(--radius);padding:18px 16px;text-align:left;transition:transform .12s,border-color .12s;box-shadow:var(--shadow)}
.log-btn:hover:not(:disabled){transform:translateY(-2px);border-color:var(--bleu)}
.log-btn:disabled{opacity:.5;cursor:not-allowed}
.log-btn .emo{font-size:1.7rem}
.log-btn .t{font-weight:700;margin-top:6px}
.log-btn .d{font-size:.82rem;color:#666}
.log-btn .pts{display:inline-block;margin-top:8px;font-weight:800;font-size:.9rem;padding:2px 10px;border-radius:12px}
.pts.p5{background:#e3fce3;color:var(--ok)}
.pts.p2{background:#fff4d6;color:#8a6d00}
.pts.pm{background:#ffe3e3;color:var(--rouge)}
.today-done{background:var(--paper);border:1px solid var(--gris-line);border-left:4px solid var(--ok);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow)}
.today-done .big{font-weight:800;color:var(--bleu)}
.next-unlock{margin-top:10px;font-size:.88rem;color:#555}

.map-flex{display:flex;gap:18px;flex-wrap:wrap}
.map-box{flex:1 1 460px;background:var(--paper);border:1px solid var(--gris-line);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);position:relative}
.map-box svg{width:100%;height:auto;display:block}
.map-box svg path[id^="dep_"]{fill:var(--locked);stroke:#fff;stroke-width:.7;cursor:pointer;transition:fill .2s}
.map-box svg path[id^="dep_"]:hover{fill:#c4c4f7}
.map-box svg path.unlocked{fill:var(--bleu)}
.map-box svg path.unlocked:hover{fill:var(--bleu-hover)}
.map-box svg path.next{stroke:var(--rouge);stroke-width:2;stroke-dasharray:5 3;animation:march 1.2s linear infinite}
@keyframes march{to{stroke-dashoffset:-16}}
.map-legend{display:flex;gap:16px;font-size:.8rem;margin-top:8px;flex-wrap:wrap}
.map-legend span{display:flex;align-items:center;gap:6px}
.swatch{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid var(--gris-line)}
.tooltip{position:fixed;background:var(--ink);color:#fff;padding:4px 10px;border-radius:4px;font-size:.8rem;pointer-events:none;z-index:50;display:none;white-space:nowrap}
.dept-panel{flex:1 1 280px;background:var(--paper);border:1px solid var(--gris-line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);align-self:flex-start;position:sticky;top:12px}
.dept-panel .num{display:inline-block;background:var(--bleu);color:#fff;font-weight:800;padding:3px 12px;border-radius:4px;font-size:.95rem}
.dept-panel .num.lockednum{background:#999}
.dept-panel h3{margin-top:10px;font-size:1.25rem;color:var(--bleu)}
.dept-panel .pref{font-size:.83rem;color:#666;margin-bottom:10px}
.dept-panel .desc{font-size:.92rem}
.dept-panel .classified{color:#888;font-style:italic}
.dept-panel .flagline{margin-top:14px}
.dept-count{font-size:.85rem;color:#555;margin-top:12px}

.games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.game-card{background:var(--paper);border:1px solid var(--gris-line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px}
.game-card .emo{font-size:2.1rem}
.game-card h3{font-size:1.02rem;color:var(--bleu)}
.game-card p{font-size:.85rem;color:#555;flex:1}
.game-card .claimed{font-size:.78rem;color:var(--ok);font-weight:700}
.btn{background:var(--bleu);color:#fff;border:none;border-radius:var(--radius);padding:10px 18px;font-weight:700;font-size:.9rem;transition:background .15s}
.btn:hover{background:var(--bleu-hover)}
.btn.ghost{background:#fff;color:var(--bleu);border:1px solid var(--bleu)}
.btn.danger{background:#fff;color:var(--rouge);border:1px solid var(--rouge)}
.btn.danger:hover{background:var(--rouge);color:#fff}

.modal-bg{position:fixed;inset:0;background:rgba(22,22,22,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--paper);border-radius:10px;max-width:560px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.modal .tricolore{border-radius:10px 10px 0 0;overflow:hidden}
.modal-inner{padding:22px}
.modal h3{color:var(--bleu);font-size:1.25rem;margin-bottom:8px}
.modal .close-row{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}

.unlock-card{text-align:center}
.unlock-card .bignum{font-size:2.6rem;font-weight:900;color:var(--bleu)}
.unlock-card .dname{font-size:1.5rem;font-weight:800}
.unlock-card .dpref{color:#666;font-size:.88rem;margin-bottom:10px}
.unlock-card .ddesc{font-size:.95rem;background:var(--gris);border-radius:var(--radius);padding:12px}

/* Baguette game */
.bag-zone{position:relative;height:74px;margin:18px 0;border-radius:37px;background:linear-gradient(180deg,#e8b96a 0%,#d99a3e 45%,#b97a26 100%);box-shadow:inset 0 -6px 12px rgba(0,0,0,.18);overflow:hidden}
.bag-zone::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(115deg,transparent 0 44px,rgba(120,70,10,.35) 44px 50px)}
.bag-target{position:absolute;top:0;bottom:0;background:rgba(255,215,0,.5);border-left:2px dashed #8a6d00;border-right:2px dashed #8a6d00}
.bag-knife{position:absolute;top:-6px;font-size:2rem;transform:translateX(-50%);transition:none;z-index:2}
.bag-score{font-size:1rem;font-weight:700;text-align:center;min-height:1.6em}
.bag-slices{display:flex;gap:6px;justify-content:center;margin:8px 0;font-size:1.3rem;min-height:1.6em}

/* Fromage game */
#fromageCanvas{display:block;margin:0 auto;background:linear-gradient(180deg,#dfeaff 0%,#f7f3e8 100%);border:1px solid var(--gris-line);border-radius:var(--radius);touch-action:none;max-width:100%}
.game-hud{display:flex;justify-content:space-between;font-weight:700;margin:8px 2px;font-size:.95rem}

/* Escargot game */
.snail-pick{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.snail-pick button{background:var(--gris);border:2px solid var(--gris-line);border-radius:var(--radius);padding:10px 14px;font-size:.9rem;font-weight:700}
.snail-pick button.sel{border-color:var(--bleu);background:#e3e3ff}
.track{background:#e9f5e1;border:1px solid var(--gris-line);border-radius:var(--radius);padding:8px;margin-top:10px}
.lane{position:relative;height:44px;border-bottom:2px dashed #bcd9ab}
.lane:last-child{border-bottom:none}
.lane .snail{position:absolute;left:0;top:4px;font-size:1.7rem;transition:left .25s linear}
.lane .lname{position:absolute;right:6px;top:12px;font-size:.72rem;color:#587a48;font-weight:700}
.finish{position:absolute;right:44px;top:0;bottom:0;width:4px;background:repeating-linear-gradient(0deg,#161616 0 6px,#fff 6px 12px)}
.commentary{min-height:2.4em;font-size:.88rem;font-style:italic;color:#444;background:var(--gris);border-radius:var(--radius);padding:8px 12px;margin-top:10px}

/* Victory */
.victory{position:fixed;inset:0;background:linear-gradient(160deg,var(--bleu) 0%,#00006a 55%,var(--rouge) 160%);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;text-align:center;color:#fff;overflow:auto}
.victory.show{display:flex}
.victory .inner{max-width:640px}
.victory img{height:80px;background:#fff;padding:8px;border-radius:8px}
.victory h2{color:#fff;font-size:2rem;justify-content:center;margin:18px 0 6px}
.victory .n1{font-size:5.5rem;font-weight:900;color:var(--gold);text-shadow:0 4px 20px rgba(0,0,0,.4);line-height:1}
.victory p{margin:12px 0;font-size:1.05rem}
.confetti{position:absolute;top:-12px;font-size:1.4rem;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 22px;border-radius:24px;font-size:.9rem;z-index:150;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Tabs */
.tabbar{position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1px solid var(--gris-line);box-shadow:var(--shadow)}
.tabbar-inner{max-width:1100px;margin:0 auto;display:flex;gap:2px;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:12px 14px;font-weight:700;font-size:.9rem;color:#555;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab-btn:hover{color:var(--bleu)}
.tab-btn.active{color:var(--bleu);border-bottom-color:var(--rouge)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Calendar */
.cal-wrap{background:var(--paper);border:1px solid var(--gris-line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.cal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.cal-title{font-weight:800;color:var(--bleu);font-size:1.1rem;text-transform:capitalize}
.cal-nav{display:flex;gap:8px}
.cal-nav button{background:#fff;color:var(--bleu);border:1px solid var(--bleu);border-radius:var(--radius);padding:6px 12px;font-weight:700}
.cal-nav button:hover{background:var(--bleu);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#777;font-weight:700;padding:4px 0}
.cal-cell{position:relative;aspect-ratio:1/1;min-height:40px;border:1px solid var(--gris-line);border-radius:6px;background:var(--gris);display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 6px;font-size:.8rem;font-weight:700;color:#555}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.future{opacity:.45}
.cal-cell.today{outline:2px solid var(--bleu);outline-offset:1px}
.cal-cell.st-both{background:#dff5e4;border-color:var(--ok);color:var(--ok)}
.cal-cell.st-night{background:#fff4d6;border-color:#c9a227;color:#8a6d00}
.cal-cell.st-none{background:#ffe3e3;border-color:var(--rouge);color:var(--rouge)}
.cal-cell .st-emo{position:absolute;left:5px;bottom:3px;font-size:.95rem}
.cal-cell .b-dot{position:absolute;right:5px;bottom:5px;width:8px;height:8px;border-radius:50%;background:var(--gold)}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:.8rem;margin-top:12px}
.cal-legend span{display:flex;align-items:center;gap:6px}
.cal-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px}

/* Guide */
.guide-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.guide-card{background:var(--paper);border:1px solid var(--gris-line);border-left:4px solid var(--bleu);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.guide-card h3{color:var(--bleu);font-size:1rem;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.guide-card p,.guide-card li{font-size:.88rem;color:#444}
.guide-card ul,.guide-card ol{padding-left:20px;margin-top:6px}
.guide-card li{margin-bottom:4px}
.guide-card code{background:var(--gris);padding:1px 5px;border-radius:4px;font-size:.8rem}

/* Profile & onboarding forms */
.form-card{background:var(--paper);border:1px solid var(--gris-line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);max-width:560px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:#666;font-weight:700;margin-bottom:5px}
.form-row input[type=text],.form-row select{width:100%;padding:10px 12px;border:1px solid var(--gris-line);border-radius:var(--radius);font-family:inherit;font-size:.95rem;background:#fff;color:var(--ink)}
.form-row input:focus,.form-row select:focus{outline:2px solid var(--bleu);border-color:var(--bleu)}
.ob-steps{display:flex;gap:6px;justify-content:center;margin:10px 0 16px}
.ob-steps span{width:9px;height:9px;border-radius:50%;background:var(--gris-line)}
.ob-steps span.on{background:var(--bleu)}
.ob-emblem{text-align:center;font-size:2.6rem;margin-bottom:6px}
.sync-card{background:var(--paper);border:1px solid var(--gris-line);border-left:4px solid var(--gold);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);max-width:560px;margin-top:16px}
.sync-status{display:flex;align-items:center;gap:8px;font-size:.9rem;margin:10px 0}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#bbb;flex:none}
.sync-dot.on{background:var(--ok)}
.sync-dot.err{background:var(--rouge)}
.btn.google{background:#fff;color:var(--ink);border:1px solid var(--gris-line);display:inline-flex;align-items:center;gap:8px}
.btn.google:hover{background:var(--gris)}

footer{border-top:1px solid var(--gris-line);background:var(--paper)}
.foot-inner{max-width:1100px;margin:0 auto;padding:18px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:.8rem;color:#666}
.foot-inner .sp{flex:1}
@media (max-width:640px){
  .head-inner img.logo{height:52px}
  .head-title h1{font-size:1.05rem}
  .dept-panel{position:static}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>

<script>
/* GAME_LOGIC_START */
const FranceGame = (function () {
  'use strict';

  const TOTAL_DAYS = 285;
  const DAYS_PER_UNLOCK = 3;
  const TOTAL_DEPTS = 95;
  const START_RANK = 195;

  const ACTIONS = {
    both: { points: 5 },
    night: { points: 2 },
    none: { points: -2 }
  };

  function freshState() {
    return {
      version: 2,
      logs: {},          // 'YYYY-MM-DD' -> 'both' | 'night' | 'none'
      bonus: {},         // 'YYYY-MM-DD' -> { baguette: n, fromage: n, escargot: n }
      lang: 'en',
      profile: { name: '', honorific: 2, onboarded: false },
      cloud: false       // true once the user has linked a Google account
    };
  }

  function isValidAction(action) {
    return Object.prototype.hasOwnProperty.call(ACTIONS, action);
  }

  function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function daysLogged(state) {
    return Object.keys(state.logs).length;
  }

  function logDay(state, key, action) {
    if (!isValidAction(action)) return { ok: false, reason: 'bad_action' };
    if (state.logs[key]) return { ok: false, reason: 'already_logged' };
    if (daysLogged(state) >= TOTAL_DAYS) return { ok: false, reason: 'complete' };
    const before = unlockedCount(state);
    state.logs[key] = action;
    const after = unlockedCount(state);
    return {
      ok: true,
      points: ACTIONS[action].points,
      newUnlocks: after - before,
      complete: daysLogged(state) >= TOTAL_DAYS
    };
  }

  function addBonus(state, key, game) {
    if (!state.bonus[key]) state.bonus[key] = {};
    if (state.bonus[key][game]) return { ok: false, reason: 'already_claimed' };
    state.bonus[key][game] = 1;
    return { ok: true, points: 1 };
  }

  function bonusClaimed(state, key, game) {
    return !!(state.bonus[key] && state.bonus[key][game]);
  }

  function totalPoints(state) {
    let pts = 0;
    for (const k in state.logs) pts += ACTIONS[state.logs[k]].points;
    for (const k in state.bonus) {
      for (const g in state.bonus[k]) pts += state.bonus[k][g];
    }
    return pts;
  }

  function unlockedCount(state) {
    return Math.min(TOTAL_DEPTS, Math.floor(daysLogged(state) / DAYS_PER_UNLOCK));
  }

  function daysToNextUnlock(state) {
    if (unlockedCount(state) >= TOTAL_DEPTS) return 0;
    const d = daysLogged(state);
    return DAYS_PER_UNLOCK - (d % DAYS_PER_UNLOCK);
  }

  function worldRank(state) {
    const d = Math.min(daysLogged(state), TOTAL_DAYS);
    return Math.max(1, START_RANK - Math.floor((START_RANK - 1) * d / TOTAL_DAYS));
  }

  function streak(state, todayKey) {
    // Counts consecutive calendar days ending today (or yesterday if today not yet logged)
    const parse = function (k) {
      const p = k.split('-');
      return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
    };
    let cursor = parse(todayKey);
    if (!state.logs[dateKey(cursor)]) {
      cursor.setDate(cursor.getDate() - 1); // today not logged yet: streak up to yesterday
    }
    let n = 0;
    while (state.logs[dateKey(cursor)]) {
      n++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return n;
  }

  function presidentTitle(state) {
    const d = daysLogged(state);
    if (d >= TOTAL_DAYS) return 5;
    if (d >= 200) return 4;
    if (d >= 120) return 3;
    if (d >= 60) return 2;
    if (d >= 20) return 1;
    return 0;
  }

  function isComplete(state) {
    return daysLogged(state) >= TOTAL_DAYS;
  }

  function migrate(raw) {
    const s = freshState();
    if (raw && typeof raw === 'object') {
      if (raw.logs && typeof raw.logs === 'object') {
        for (const k in raw.logs) {
          if (isValidAction(raw.logs[k])) s.logs[k] = raw.logs[k];
        }
      }
      if (raw.bonus && typeof raw.bonus === 'object') s.bonus = raw.bonus;
      if (raw.lang === 'fr' || raw.lang === 'en') s.lang = raw.lang;
      if (raw.profile && typeof raw.profile === 'object') {
        if (typeof raw.profile.name === 'string') s.profile.name = raw.profile.name.slice(0, 40);
        if (raw.profile.honorific === 0 || raw.profile.honorific === 1 || raw.profile.honorific === 2) {
          s.profile.honorific = raw.profile.honorific;
        }
        s.profile.onboarded = !!raw.profile.onboarded;
      }
      s.cloud = !!raw.cloud;
    }
    return s;
  }

  // Union of two states: keeps every logged day and bonus from both sides.
  // On a per-day conflict the local entry wins (it is what the user saw last).
  function mergeStates(local, remote) {
    const a = migrate(local);
    const b = migrate(remote);
    const s = migrate(local); // start from local
    for (const k in b.logs) {
      if (!s.logs[k]) s.logs[k] = b.logs[k];
    }
    for (const k in b.bonus) {
      if (!s.bonus[k]) s.bonus[k] = {};
      for (const g in b.bonus[k]) {
        if (!s.bonus[k][g]) s.bonus[k][g] = b.bonus[k][g];
      }
    }
    if (!a.profile.onboarded && b.profile.onboarded) s.profile = b.profile;
    s.cloud = a.cloud || b.cloud;
    return s;
  }

  return {
    TOTAL_DAYS: TOTAL_DAYS,
    DAYS_PER_UNLOCK: DAYS_PER_UNLOCK,
    TOTAL_DEPTS: TOTAL_DEPTS,
    ACTIONS: ACTIONS,
    freshState: freshState,
    isValidAction: isValidAction,
    dateKey: dateKey,
    daysLogged: daysLogged,
    logDay: logDay,
    addBonus: addBonus,
    bonusClaimed: bonusClaimed,
    totalPoints: totalPoints,
    unlockedCount: unlockedCount,
    daysToNextUnlock: daysToNextUnlock,
    worldRank: worldRank,
    streak: streak,
    presidentTitle: presidentTitle,
    isComplete: isComplete,
    migrate: migrate,
    mergeStates: mergeStates
  };
})();
/* GAME_LOGIC_END */

/* ---------- Storage: window.storage -> localStorage -> memory ---------- */
const Store = (function () {
  const KEY = 'fr_pres_v1';
  let mem = null;
  async function load() {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function') {
      try {
        const r = await window.storage.get(KEY);
        if (r && r.value) return JSON.parse(r.value);
        return null;
      } catch (e) { /* key missing or storage unavailable: fall through */ }
    }
    try {
      const v = localStorage.getItem(KEY);
      if (v) return JSON.parse(v);
    } catch (e) { /* localStorage blocked: fall through */ }
    return mem;
  }
  async function save(state) {
    const v = JSON.stringify(state);
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function') {
      try { const r = await window.storage.set(KEY, v); if (r) { mem = state; return; } } catch (e) {}
    }
    try { localStorage.setItem(KEY, v); mem = state; return; } catch (e) {}
    mem = state;
  }
  async function clear() {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.delete === 'function') {
      try { await window.storage.delete(KEY); } catch (e) {}
    }
    try { localStorage.removeItem(KEY); } catch (e) {}
    mem = null;
  }
  return { load, save, clear };
})();

/* ---------- App ---------- */
let S = FranceGame.freshState();
const $ = (id) => document.getElementById(id);
const todayKey = () => FranceGame.dateKey(new Date());
const T = () => I18N[S.lang];
const fmt = (str, vars) => str.replace(/\{(\w+)\}/g, (_, k) => vars[k]);

function save() { Store.save(S); CloudSync.push(S); }

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function salutation() {
  const t = T();
  const h = t.honorifics[S.profile.honorific] || t.honorifics[2];
  return S.profile.name ? h + ' ' + esc(S.profile.name) : h;
}

function applyI18n() {
  const t = T();
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (t[k] !== undefined && typeof t[k] === 'string') el.textContent = t[k];
  });
  let brief = t.brief;
  if (S.profile.onboarded && (S.profile.name || S.profile.honorific !== 2)) {
    brief = brief.replace('Madame / Monsieur le Président', salutation());
  }
  $('briefBox').innerHTML = brief;
  $('langEn').classList.toggle('active', S.lang === 'en');
  $('langFr').classList.toggle('active', S.lang === 'fr');
  document.documentElement.lang = S.lang;
}

function unlockedSet() {
  const n = FranceGame.unlockedCount(S);
  return new Set(UNLOCK_ORDER.slice(0, n));
}

function nextDeptKey() {
  const n = FranceGame.unlockedCount(S);
  return n < UNLOCK_ORDER.length ? UNLOCK_ORDER[n] : null;
}

function svgPathsFor(key) {
  if (key === 'corse') return ['dep_2a', 'dep_2b'].map(id => document.getElementById(id)).filter(Boolean);
  const p = document.getElementById('dep_' + key);
  return p ? [p] : [];
}

function deptKeyFromPath(pathId) {
  const raw = pathId.replace('dep_', '');
  return (raw === '2a' || raw === '2b') ? 'corse' : raw;
}

/* ---- Game 1: The Perfect Baguette ---- */
function playBaguette() {
  const t = T();
  openGame(
    '<h3>🥖 ' + t.g1_title + '</h3>' +
    '<p style="font-size:.88rem;color:#555">' + t.bag_start + '</p>' +
    '<div class="bag-slices" id="bagSlices"></div>' +
    '<div class="bag-zone" id="bagZone"><div class="bag-target" id="bagTarget"></div><div class="bag-knife" id="bagKnife">🔪</div></div>' +
    '<div class="bag-score" id="bagMsg">&nbsp;</div>' +
    '<div class="close-row"><button class="btn ghost" id="gClose">' + t.btn_close + '</button>' +
    '<button class="btn" id="bagCut">' + t.bag_cut + '</button></div>'
  );
  let pos = 0, dir = 1, hits = 0, slice = 0, raf = null, over = false;
  const zone = $('bagZone'), knife = $('bagKnife'), target = $('bagTarget');
  let tStart = 0, tWidth = 0;
  function newTarget() {
    tWidth = 12 + Math.random() * 8;
    tStart = 8 + Math.random() * (84 - tWidth);
    target.style.left = tStart + '%';
    target.style.width = tWidth + '%';
  }
  function tick() {
    pos += dir * 1.35;
    if (pos >= 100) { pos = 100; dir = -1; }
    if (pos <= 0) { pos = 0; dir = 1; }
    knife.style.left = pos + '%';
    raf = requestAnimationFrame(tick);
  }
  function cut() {
    if (over) return;
    slice++;
    const hit = pos >= tStart && pos <= tStart + tWidth;
    if (hit) hits++;
    $('bagSlices').textContent += hit ? ' ✅' : ' ❌';
    $('bagMsg').textContent = hit ? t.bag_perfect : t.bag_miss;
    if (slice >= 5) {
      over = true;
      cancelAnimationFrame(raf);
      const won = hits >= 3;
      $('bagMsg').textContent = won ? t.bag_win : fmt(t.bag_lose, { n: hits });
      if (won) grantBonus('baguette');
      $('bagCut').textContent = t.btn_again;
      $('bagCut').onclick = playBaguette;
    } else {
      newTarget();
    }
  }
  const keyH = (e) => { if (e.code === 'Space') { e.preventDefault(); cut(); } };
  document.addEventListener('keydown', keyH);
  $('bagCut').onclick = cut;
  zone.onclick = cut;
  $('gClose').onclick = closeGame;
  activeCleanup = () => { cancelAnimationFrame(raf); document.removeEventListener('keydown', keyH); };
  newTarget();
  tick();
}

/* ---- Game 2: Catch the Fromage ---- */
function playFromage() {
  const t = T();
  openGame(
    '<h3>🧀 ' + t.g2_title + '</h3>' +
    '<p style="font-size:.88rem;color:#555">' + t.fro_start + '</p>' +
    '<div class="game-hud"><span>' + t.score + ': <span id="froScore">0</span></span>' +
    '<span>' + t.time + ': <span id="froTime">30</span>s</span></div>' +
    '<canvas id="fromageCanvas" width="340" height="420"></canvas>' +
    '<div class="bag-score" id="froMsg">&nbsp;</div>' +
    '<div class="close-row"><button class="btn ghost" id="gClose">' + t.btn_close + '</button>' +
    '<button class="btn" id="froGo">' + t.fro_go + '</button></div>'
  );
  const cv = $('fromageCanvas');
  const ctx = cv.getContext('2d');
  let running = false, score = 0, timeLeft = 30, items = [], px = 170, raf = null, timer = null, spawn = null;
  const keys = {};
  function drawBeret(x) {
    ctx.save();
    ctx.translate(x, 388);
    ctx.fillStyle = '#161616';
    ctx.beginPath();
    ctx.ellipse(0, 0, 38, 15, 0, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -8, 30, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(-2, -22, 4, 8);
    ctx.restore();
  }
  function loop() {
    ctx.clearRect(0, 0, 340, 420);
    // Eiffel silhouette backdrop
    ctx.save();
    ctx.globalAlpha = .12;
    ctx.fillStyle = '#000091';
    ctx.beginPath();
    ctx.moveTo(150, 420); ctx.lineTo(168, 250); ctx.lineTo(172, 250); ctx.lineTo(190, 420);
    ctx.moveTo(160, 330); ctx.lineTo(180, 330);
    ctx.fill();
    ctx.restore();
    if (keys.ArrowLeft) px -= 6;
    if (keys.ArrowRight) px += 6;
    px = Math.max(40, Math.min(300, px));
    ctx.font = '26px serif';
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y += it.v;
      ctx.fillText(it.g, it.x - 13, it.y);
      if (it.y > 372 && it.y < 404 && Math.abs(it.x - px) < 42) {
        score += it.good ? 1 : -1;
        if (score < 0) score = 0;
        $('froScore').textContent = score;
        items.splice(i, 1);
      } else if (it.y > 430) {
        items.splice(i, 1);
      }
    }
    drawBeret(px);
    if (running) raf = requestAnimationFrame(loop);
  }
  function start() {
    if (running) return;
    running = true; score = 0; timeLeft = 30; items = [];
    $('froScore').textContent = '0';
    $('froTime').textContent = '30';
    $('froMsg').innerHTML = '&nbsp;';
    spawn = setInterval(() => {
      const r = Math.random();
      const good = r > 0.32;
      const g = good ? (Math.random() > 0.4 ? '🧀' : '🥐') : '🐦';
      items.push({ x: 30 + Math.random() * 280, y: -10, v: 2 + Math.random() * 2.4, g, good });
    }, 520);
    timer = setInterval(() => {
      timeLeft--;
      $('froTime').textContent = timeLeft;
      if (timeLeft <= 0) end();
    }, 1000);
    loop();
  }
  function end() {
    running = false;
    clearInterval(timer); clearInterval(spawn); cancelAnimationFrame(raf);
    const won = score >= 10;
    $('froMsg').textContent = won ? t.fro_win : fmt(t.fro_lose, { s: score });
    if (won) grantBonus('fromage');
    $('froGo').textContent = t.btn_again;
  }
  const kd = (e) => { if (e.key.startsWith('Arrow')) { keys[e.key] = true; e.preventDefault(); } };
  const ku = (e) => { keys[e.key] = false; };
  const mv = (e) => {
    const rect = cv.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    px = Math.max(40, Math.min(300, cx * (340 / rect.width)));
    if (e.touches) e.preventDefault();
  };
  document.addEventListener('keydown', kd);
  document.addEventListener('keyup', ku);
  cv.addEventListener('mousemove', mv);
  cv.addEventListener('touchmove', mv, { passive: false });
  $('froGo').onclick = start;
  $('gClose').onclick = closeGame;
  activeCleanup = () => {
    running = false;
    clearInterval(timer); clearInterval(spawn); cancelAnimationFrame(raf);
    document.removeEventListener('keydown', kd);
    document.removeEventListener('keyup', ku);
  };
  loop();
}

/* ---- Game 3: Snail Grand Prix ---- */
function playEscargot() {
  const t = T();
  const names = t.esc_names;
  openGame(
    '<h3>🐌 ' + t.g3_title + '</h3>' +
    '<p style="font-size:.88rem;color:#555">' + t.esc_pick + '</p>' +
    '<div class="snail-pick">' +
    names.map((n, i) => '<button data-i="' + i + '">🐌 ' + n + '</button>').join('') +
    '</div>' +
    '<div class="track" style="position:relative"><div class="finish"></div>' +
    names.map((n, i) => '<div class="lane"><span class="snail" id="sn' + i + '">🐌</span><span class="lname">' + n + '</span></div>').join('') +
    '</div>' +
    '<div class="commentary" id="escComm">…</div>' +
    '<div class="close-row"><button class="btn ghost" id="gClose">' + t.btn_close + '</button>' +
    '<button class="btn" id="escGo" disabled>' + t.esc_start + '</button></div>'
  );
  let pick = -1, running = false, timer = null, commTimer = null;
  const picks = document.querySelectorAll('.snail-pick button');
  picks.forEach(b => b.onclick = () => {
    if (running) return;
    pick = Number(b.dataset.i);
    picks.forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    $('escGo').disabled = false;
  });
  function race() {
    if (running || pick < 0) return;
    running = true;
    $('escGo').disabled = true;
    const track = document.querySelector('.track');
    const finish = track.clientWidth - 58;
    const pos = [0, 0, 0];
    const napping = [0, 0, 0];
    let lineIdx = 0;
    commTimer = setInterval(() => {
      $('escComm').textContent = '📻 ' + t.esc_lines[lineIdx % t.esc_lines.length];
      lineIdx++;
    }, 2600);
    timer = setInterval(() => {
      for (let i = 0; i < 3; i++) {
        if (napping[i] > 0) { napping[i]--; continue; }
        if (Math.random() < 0.06) { napping[i] = 3 + Math.floor(Math.random() * 4); document.getElementById('sn' + i).textContent = '🐌💤'; continue; }
        document.getElementById('sn' + i).textContent = '🐌';
        pos[i] += 2 + Math.random() * 7;
        document.getElementById('sn' + i).style.left = Math.min(pos[i], finish) + 'px';
        if (pos[i] >= finish) {
          clearInterval(timer); clearInterval(commTimer);
          running = false;
          const won = i === pick;
          $('escComm').textContent = won ? '🏆 ' + fmt(t.esc_win, { name: names[i] }) : fmt(t.esc_lose, { name: names[pick] }) + ' (🏆 ' + names[i] + ')';
          if (won) grantBonus('escargot');
          $('escGo').textContent = t.btn_again;
          $('escGo').disabled = false;
          $('escGo').onclick = playEscargot;
          return;
        }
      }
    }, 250);
  }
  $('escGo').onclick = race;
  $('gClose').onclick = closeGame;
  activeCleanup = () => { clearInterval(timer); clearInterval(commTimer); };
}

/* ---------- Calendar (Journal) ---------- */
let calCursor = (function () { const d = new Date(); d.setDate(1); return d; })();

function renderCalendar() {
  const grid = $('calGrid');
  if (!grid) return;
  const t = T();
  const y = calCursor.getFullYear();
  const m = calCursor.getMonth();
  const now = new Date();
  const tKey = todayKey();
  $('calTitle').textContent = calCursor.toLocaleDateString(S.lang === 'fr' ? 'fr-FR' : 'en-US', { month: 'long', year: 'numeric' });

  let html = t.cal_dows.map(d => '<div class="cal-dow">' + d + '</div>').join('');
  const first = new Date(y, m, 1);
  const offset = (first.getDay() + 6) % 7; // week starts Monday
  for (let i = 0; i < offset; i++) html += '<div class="cal-cell empty"></div>';

  const daysInMonth = new Date(y, m + 1, 0).getDate();
  let mDays = 0, mPts = 0, mPerfect = 0;
  const EMO = { both: '🧴', night: '🌙', none: '🫥' };
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(y, m, d);
    const key = FranceGame.dateKey(date);
    const status = S.logs[key];
    const isFuture = date > now && key !== tKey;
    const hasBonus = !!(S.bonus[key] && Object.keys(S.bonus[key]).length);
    let cls = 'cal-cell';
    if (status) cls += ' st-' + status;
    if (isFuture) cls += ' future';
    if (key === tKey) cls += ' today';
    let title = key;
    if (status) {
      mDays++;
      mPts += FranceGame.ACTIONS[status].points;
      if (status === 'both') mPerfect++;
      title += ' — ' + (status === 'both' ? t.b1_t : status === 'night' ? t.b2_t : t.b3_t);
    }
    if (hasBonus) {
      const b = Object.values(S.bonus[key]).reduce((a, n) => a + n, 0);
      mPts += b;
      title += ' · +' + b;
    }
    html += '<div class="' + cls + '" title="' + esc(title) + '">' + d +
      (status ? '<span class="st-emo">' + EMO[status] + '</span>' : '') +
      (hasBonus ? '<span class="b-dot"></span>' : '') + '</div>';
  }
  grid.innerHTML = html;
  $('calMDays').textContent = mDays;
  $('calMPts').textContent = mPts;
  $('calMPerfect').textContent = mPerfect;
}

function initCalendarNav() {
  $('calPrev').addEventListener('click', () => { calCursor.setMonth(calCursor.getMonth() - 1); renderCalendar(); });
  $('calNext').addEventListener('click', () => { calCursor.setMonth(calCursor.getMonth() + 1); renderCalendar(); });
  $('calToday').addEventListener('click', () => { calCursor = new Date(); calCursor.setDate(1); renderCalendar(); });
}

  if (obStep === 0) {
    body.innerHTML =
      '<div class="ob-emblem">🇫🇷</div>' + obDots() +
      '<h3 style="text-align:center">' + t.ob_w_t + '</h3>' +
      '<p style="font-size:.92rem;margin:10px 0 16px">' + t.ob_w_b + '</p>' +
      '<div class="form-row"><label>' + t.ob_lang_l + '</label>' +
      '<div class="lang-toggle" style="display:inline-flex">' +
      '<button type="button" id="obLangEn" class="' + (S.lang === 'en' ? 'active' : '') + '">EN</button>' +
      '<button type="button" id="obLangFr" class="' + (S.lang === 'fr' ? 'active' : '') + '">FR</button></div></div>' +
      '<div class="close-row"><button class="btn" id="obNext">' + t.ob_next + ' →</button></div>';
    $('obLangEn').onclick = () => { S.lang = 'en'; save(); applyI18n(); renderOnboarding(); };
    $('obLangFr').onclick = () => { S.lang = 'fr'; save(); applyI18n(); renderOnboarding(); };
    $('obNext').onclick = () => { obStep = 1; renderOnboarding(); };
  } else if (obStep === 1) {
    body.innerHTML =
      '<div class="ob-emblem">🖋️</div>' + obDots() +
      '<h3 style="text-align:center">' + t.ob_p_t + '</h3>' +
      '<p style="font-size:.9rem;margin:10px 0 16px">' + t.ob_p_b + '</p>' +
      '<div class="form-row"><label for="obName">' + t.pr_name + '</label>' +
      '<input type="text" id="obName" maxlength="40" placeholder="' + esc(t.pr_name_ph) + '" value="' + esc(obDraft.name) + '"></div>' +
      '<div class="form-row"><label for="obHonorific">' + t.pr_honorific + '</label>' +
      '<select id="obHonorific">' + t.honorifics.map((h, i) =>
        '<option value="' + i + '"' + (i === obDraft.honorific ? ' selected' : '') + '>' + esc(h) + '</option>').join('') + '</select></div>' +
      '<div class="close-row"><button class="btn ghost" id="obBack">← ' + t.ob_back + '</button>' +
      '<button class="btn" id="obNext">' + t.ob_next + ' →</button></div>';
    const keep = () => {
      obDraft.name = $('obName').value.trim().slice(0, 40);
      obDraft.honorific = Number($('obHonorific').value) || 0;
    };
    $('obBack').onclick = () => { keep(); obStep = 0; renderOnboarding(); };
    $('obNext').onclick = () => { keep(); obStep = 2; renderOnboarding(); };
  } else {
    body.innerHTML =
      '<div class="ob-emblem">📜</div>' + obDots() +
      '<h3 style="text-align:center">' + t.ob_h_t + '</h3>' +
      '<div style="font-size:.9rem;margin:10px 0 6px">' + t.ob_h_b + '</div>' +
      '<div class="close-row"><button class="btn ghost" id="obBack">← ' + t.ob_back + '</button>' +
      '<button class="btn" id="obStart">🏛️ ' + t.ob_start + '</button></div>';
    $('obBack').onclick = () => { obStep = 1; renderOnboarding(); };
    $('obStart').onclick = () => {
      S.profile.name = obDraft.name;
      S.profile.honorific = obDraft.honorific;
      S.profile.onboarded = true;
      save();
      $('obModal').classList.remove('show');
      renderAll();
      toast(fmt(T().ob_done, { n: S.profile.name || salutation() }));
    };
  }
}

/* ---------- Cloud sync: Firebase Realtime Database + Google sign-in ----------
   Offline-first. The SDK loads dynamically only when needed; nothing here runs
   (or is even downloaded) unless a Firebase project is configured below.

   SETUP (once):
   1. console.firebase.google.com → create a project → add a Web app.
   2. Paste the web app config values into FIREBASE_CONFIG below.
   3. Authentication → Sign-in method → enable Google.
   4. Build a Realtime Database; add your GitHub Pages domain to
      Authentication → Authorized domains.
   Suggested database rules:
   { "rules": { "users": { "$uid": {
     ".read": "$uid === auth.uid", ".write": "$uid === auth.uid" } } } }
------------------------------------------------------------------------------ */
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA8a7r2YNQwKSuWtR-pQGD2-SVeI5BdGu0",
  authDomain: "french-cad04.firebaseapp.com",
  databaseURL: "https://french-cad04-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "french-cad04",
  storageBucket: "french-cad04.firebasestorage.app",
  messagingSenderId: "1033552163688",
  appId: "1:1033552163688:web:13904324395f6b228e5cdd",
  measurementId: "G-HC8SQCFSS4"
};

const CloudSync = (function () {
  const SDK = 'https://www.gstatic.com/firebasejs/10.14.1/';
  const PATH_KEY = 'fr_pres_v1';
  let ready = false, loading = false, user = null;

  function configured() {
    return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.projectId);
  }
  function currentUser() { return user; }

  function loadScript(src) {
    return new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = res;
      s.onerror = () => rej(new Error('sdk_load_failed'));
      document.head.appendChild(s);
    });
  }

  async function init() {
    if (ready) return true;
    if (!configured() || loading) return false;
    loading = true;
    try {
      await loadScript(SDK + 'firebase-app-compat.js');
      await loadScript(SDK + 'firebase-auth-compat.js');
      await loadScript(SDK + 'firebase-database-compat.js');
      firebase.initializeApp(FIREBASE_CONFIG);
      firebase.auth().onAuthStateChanged(async (u) => {
        user = u;
        if (u) {
          const remote = await pull();
          if (remote) {
            S = FranceGame.mergeStates(S, remote);
            toast(T().sy_merged);
          }
          S.cloud = true;
          save();
          renderAll();
        } else {
          renderSync();
        }
      });
      ready = true;
      return true;
    } catch (e) {
      return false;
    } finally {
      loading = false;
    }
  }

  async function signIn() {
    if (!configured()) return { ok: false, reason: 'nocfg' };
    const ok = await init();
    if (!ok && !ready) return { ok: false, reason: 'sdk' };
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
      return { ok: true };
    } catch (e) {
      return { ok: false, reason: (e && e.code) || 'error' };
    }
  }

  async function signOut() {
    if (ready) { try { await firebase.auth().signOut(); } catch (e) {} }
    user = null;
    S.cloud = false;
    save();
    renderSync();
  }

  function refPath() { return 'users/' + user.uid + '/' + PATH_KEY; }

  async function push(state) {
    if (!ready || !user) return;
    try {
      await firebase.database().ref(refPath()).set(JSON.parse(JSON.stringify(state)));
    } catch (e) { /* offline or rules issue: local copy is authoritative anyway */ }
  }

  async function pull() {
    if (!ready || !user) return null;
    try {
      const snap = await firebase.database().ref(refPath()).get();
      return snap.exists() ? snap.val() : null;
    } catch (e) { return null; }
  }

  return { configured, init, signIn, signOut, push, pull, currentUser };
})();

function renderSync() {
  const t = T();
  const dot = $('syDot'), status = $('syStatus'), actions = $('syActions');
  if (!dot) return;
  const u = CloudSync.currentUser();
  if (!CloudSync.configured()) {
    dot.className = 'sync-dot';
    status.textContent = t.sy_nocfg;
    actions.innerHTML = '';
    return;
  }
  if (u) {
    dot.className = 'sync-dot on';
    status.textContent = fmt(t.sy_on, { n: u.displayName || u.email || '—' });
    actions.innerHTML = '<button class="btn ghost" id="syOut">' + t.sy_signout + '</button>';
    $('syOut').onclick = () => CloudSync.signOut();
  } else {
    dot.className = 'sync-dot';
    status.textContent = t.sy_off;
    actions.innerHTML = '<button class="btn google" id="syIn"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 40.2 44 35 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>' + t.sy_signin + '</button>';
    $('syIn').onclick = async () => {
      status.textContent = t.sy_connecting;
      const res = await CloudSync.signIn();
      if (!res.ok) {
        dot.className = 'sync-dot err';
        status.textContent = res.reason === 'nocfg' ? t.sy_nocfg : fmt(t.sy_err, { e: res.reason });
      }
    };
  }
}

/* ---------- Wiring ---------- */
document.querySelectorAll('[data-game]').forEach(b => {
  b.addEventListener('click', () => {
    const g = b.dataset.game;
    if (g === 'baguette') playBaguette();
    else if (g === 'fromage') playFromage();
    else playEscargot();
  });
});
$('langEn').addEventListener('click', () => { S.lang = 'en'; save(); renderAll(); });
$('langFr').addEventListener('click', () => { S.lang = 'fr'; save(); renderAll(); });
$('resetBtn').addEventListener('click', async () => {
  if (!confirm(T().reset_confirm)) return;
  await Store.clear();
  S = FranceGame.freshState();
  delete $('deptPanel').dataset.sel;
  save();
  renderAll();
});
$('victoryClose').addEventListener('click', () => $('victory').classList.remove('show'));
$('unlockModal').addEventListener('click', (e) => { if (e.target === $('unlockModal')) $('unlockModal').classList.remove('show'); });

/* Exposed for the test harness */
window.FranceGame = FranceGame;
window.DEPTS = DEPTS;
window.UNLOCK_ORDER = UNLOCK_ORDER;

(async function init() {
  const raw = await Store.load();
  S = FranceGame.migrate(raw);
  initMap();
  initTabs();
  initCalendarNav();
  initProfile();
  renderAll();
  if (!S.profile.onboarded) showOnboarding();
  if (S.cloud && CloudSync.configured()) CloudSync.init(); // restore the Google session silently
  if (FranceGame.isComplete(S)) showVictory();
})();
